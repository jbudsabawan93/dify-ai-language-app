<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <title>AI Vocabulary</title>

        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="container">
            <h2>📘 AI Vocabulary</h2>

            <div class="search">
                <input id="inputWord" placeholder="พิมพ์คำศัพท์..." />
                <button onclick="search()">ค้นหา</button>
            </div>

            <div class="loading" id="loading">⏳ กำลังโหลด...</div>

            <div class="card">
                <img id="image" src="no-image.jpg" />

                <div class="lang">
                    <b>ภาษาไทย:</b> <span id="word_th"></span><br />
                    คำอ่าน: <span id="phonetic_th"></span><br />
                    ความหมาย: <span id="meaning_th"></span><br />
                    <button onclick="speak('th')">🔊 ฟังภาษาไทย</button>
                </div>

                <hr />

                <div class="lang">
                    <b>English:</b> <span id="word_en"></span><br />
                    Pronunciation: <span id="phonetic_en"></span><br />
                    Meaning: <span id="meaning_en"></span><br />
                    <button onclick="speak('en')">🔊 Listening</button>
                </div>

                <hr />

                <div class="lang">
                    <b>日本語:</b> <span id="word_ja"></span><br />
                    読み方: <span id="phonetic_ja"></span><br />
                    意味: <span id="meaning_ja"></span><br />
                    <button onclick="speak('ja')">🔊 押して聞く</button>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
