<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <title>AI Vocabulary</title>
        <link
            rel="icon"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='0.9em' font-size='52'%3E%F0%9F%93%98%3C/text%3E%3C/svg%3E"
        />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="container">
            <h2>📘 AI Vocabulary</h2>

            <div class="search">
                <input id="inputWord" placeholder="พิมพ์คำศัพท์..." />
                <button onclick="search()">ค้นหา</button>
            </div>

            <div class="loading" id="loading">⏳ กำลังโหลด...</div>

            <div class="card">
                <img id="image" src="no-image.jpg" alt="Vocabulary image" />

                <div class="lang">
                    <b>ภาษาไทย:</b> <span id="word_th"></span><br />
                    คำอ่าน: <span id="phonetic_th"></span><br />
                    ความหมาย: <span id="meaning_th"></span><br />
                    <button onclick="speak('th')">🔊 ฟังภาษาไทย</button>
                </div>

                <hr />

                <div class="lang">
                    <b>English:</b> <span id="word_en"></span><br />
                    Pronunciation: <span id="phonetic_en"></span><br />
                    Meaning: <span id="meaning_en"></span><br />
                    <button onclick="speak('en')">🔊 Listening</button>
                </div>

                <hr />

                <div class="lang">
                    <b>日本語:</b> <span id="word_ja"></span><br />
                    読み方: <span id="phonetic_ja"></span><br />
                    意味: <span id="meaning_ja"></span><br />
                    <button onclick="speak('ja')">🔊 押して聞く</button>
                </div>
            </div>
        </div>

        <div id="imageModal" class="image-modal" onclick="closeImageModal()">
            <img id="modalImage" class="image-modal-content" alt="Full size image" />
        </div>

        <script src="app.js"></script>
    </body>
</html>
