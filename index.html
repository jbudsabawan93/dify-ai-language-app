<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <title>AI Vocabulary Helper</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <style>
            body {
                font-family: system-ui;
                background: #f3f4f6;
                padding: 30px;
            }

            .container {
                max-width: 500px;
                margin: auto;
            }

            .card {
                background: white;
                border-radius: 14px;
                padding: 20px;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            }

            input {
                width: 70%;
                padding: 10px;
                font-size: 16px;
                border-radius: 8px;
                border: 1px solid #ddd;
            }

            button {
                padding: 10px 16px;
                font-size: 16px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                background: #2563eb;
                color: white;
            }

            button:hover {
                background: #1d4ed8;
            }

            .word {
                font-size: 30px;
                font-weight: bold;
                margin-top: 10px;
            }

            .meaning {
                margin-top: 6px;
                font-size: 18px;
            }

            img {
                width: 100%;
                border-radius: 10px;
                margin-top: 12px;
            }

            .tools {
                margin-top: 12px;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>AI Vocabulary</h2>

            <div style="margin-bottom: 15px">
                <input id="inputWord" placeholder="พิมพ์คำศัพท์ เช่น apple" />
                <button onclick="searchWord()">ค้นหา</button>
            </div>

            <div class="card">
                <div class="word" id="word">-</div>

                <div class="meaning" id="meaning_th"></div>

                <div class="meaning" id="meaning_en"></div>

                <div class="meaning" id="phonetic"></div>

                <img id="image" src="" style="display: none" />

                <div class="tools">
                    <button onclick="speak()">🔊 ฟังเสียง</button>
                </div>
            </div>
        </div>

        <script>
            let currentWord = "";
            let currentLang = "en-US";

            async function searchWord() {
                const word = document.getElementById("inputWord").value;

                if (!word) return;

                const response = await fetch(
                    "https://api.dify.ai/v1/workflows/run",
                    {
                        method: "POST",
                        headers: {
                            Authorization:
                                "Bearer app-laY1BIEQpB1r9JVg2QMKyCxW",
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            inputs: {
                                word: word,
                            },
                            response_mode: "blocking",
                            user: "web-user",
                        }),
                    },
                );

                const data = await response.json();

                const result = data.data.outputs;

                showResult(result);
            }

            function showResult(data) {
                document.getElementById("word").innerText = data.word;

                document.getElementById("meaning_th").innerText =
                    "TH: " + data.meaning_th;

                document.getElementById("meaning_en").innerText =
                    "EN: " + data.meaning_en;

                document.getElementById("phonetic").innerText =
                    "อ่าน: " + data.phonetic_th;

                currentWord = data.word;
                currentLang = data.tts_lang;

                loadImage(data.image_keyword);
            }

            function loadImage(keyword) {
                const url = `https://source.unsplash.com/400x300/?${keyword}`;

                const img = document.getElementById("image");

                img.src = url;

                img.style.display = "block";
            }

            function speak() {
                if (!currentWord) return;

                const utterance = new SpeechSynthesisUtterance(currentWord);

                utterance.lang = currentLang;

                speechSynthesis.speak(utterance);
            }
        </script>
    </body>
</html>
